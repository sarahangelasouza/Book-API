name: Postman API Validation & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate API Spec & Collection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/unix.sh" | sh

      - name: Login to Postman
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: postman login --with-api-key "$POSTMAN_API_KEY"

      - name: Lint API Spec
        run: postman spec lint ./postman/specs/book-api.yaml --fail-severity WARNING

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Start server
        run: |
          npm run dev &
          for i in {1..20}; do
            nc -z localhost 3000 && echo "Server is up!" && break
            echo "Waiting for server..."
            sleep 2
          done

      - name: Run Collection Tests
        run: postman collection run "./postman/collections/Book API" -e ./postman/environments/local.json

      - name: Stop server
        if: always()
        run: pkill -f "node src/server.js" || true

  publish:
    name: Push to Postman Cloud
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/unix.sh" | sh

      - name: Login to Postman
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: postman login --with-api-key "$POSTMAN_API_KEY"

      - name: Push to Cloud
        run: postman workspace push -y
