$kind: http-example
request:
  url: "{{baseUrl}}/parts/:id"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    id: invalid-id
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "code": "PART_NOT_FOUND",
        "message": "Part not found"
      }
order: 2000
