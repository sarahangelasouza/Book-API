$kind: http-example
request:
  url: "{{baseUrl}}/books"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
  body:
    type: json
    content: |-
      {
        "title": "The Great Gatsby",
        "author": "F. Scott Fitzgerald",
        "genre": "fiction",
        "yearPublished": 1925
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
          "message": "Internal Service Error. Try again later."
      }
order: 3000
name: 500 internal error Create Book
