$kind: http-example
request:
  url: "{{baseUrl}}/books"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "title": "<string>",
        "author": "<string>",
        "genre": "<string>",
        "yearPublished": "<integer>"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "error": {
              "code": "<integer>",
              "message": "<string>"
          }
      }
order: 2000
