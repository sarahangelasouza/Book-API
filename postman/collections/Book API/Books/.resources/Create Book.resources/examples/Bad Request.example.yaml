$kind: http-example
request:
  url: "{{baseUrl}}/books"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "title": "The Great Gatsby",
        "author": "F. Scott Fitzgerald",
        "genre": "fiction",
        "yearPublished": 1925
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": 400,
          "message": "Bad Request"
        }
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "error": {
            "type": "object",
            "properties": {
              "code": {
                "type": "integer",
                "example": 400,
                "description": "HTTP status code."
              },
              "message": {
                "type": "string",
                "example": "Bad Request",
                "description": "Error message."
              }
            }
          }
        }
      }
order: 2000
