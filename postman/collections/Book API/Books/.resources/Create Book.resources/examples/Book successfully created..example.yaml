$kind: http-example
request:
  url: "{{baseUrl}}/books"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "title": "<string>",
        "author": "<string>",
        "genre": "<string>",
        "yearPublished": "<integer>"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "id": "<string>",
          "title": "<string>",
          "author": "<string>",
          "genre": "<string>",
          "yearPublished": "<integer>",
          "checkedOut": "<boolean>",
          "isPermanentCollection": "<boolean>",
          "createdAt": "<dateTime>"
      }
order: 1000
