$kind: http-example
request:
  url: '{{baseUrl}}/books/:id'
  method: DELETE
  pathVariables:
    id: '{{bookID}}'
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "error": {
              "code": 400,
              "message": "Bad Request"
          }
      }
order: 3000
