$kind: http-example
request:
  url: '{{baseUrl}}/books/:id'
  method: DELETE
  pathVariables:
    id: '{{bookID}}'
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: json
    content: |-
      {
          "error": {
              "code": 500,
              "message": "Internal Server Error"
          }
      }
order: 2000
