$kind: http-example
request:
  url: "{{baseUrl}}/books/:id"
  method: DELETE
  pathVariables:
    id: "{{bookID}}"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "message":"Book successfully removed."
      }
order: 1000
