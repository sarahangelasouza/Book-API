$kind: http-example
request:
  url: "{{baseUrl}}/books"
  method: GET
  headers:
    Accept: application/json
  body:
    type: text
    content: ""
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": 500,
          "message": "Internal Server Error"
        }
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "error": {
            "type": "object",
            "properties": {
              "code": {
                "type": "integer",
                "example": 400,
                "description": "HTTP status code."
              },
              "message": {
                "type": "string",
                "example": "Bad Request",
                "description": "Error message."
              }
            }
          }
        }
      }
order: 2000
