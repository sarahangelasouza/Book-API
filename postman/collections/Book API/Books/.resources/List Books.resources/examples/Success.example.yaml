              "description": "# Fetch a List of Books\n\nThis endpoint retrieves a list of books from the library database. It returns an array of book objects with comprehensive information about each book in the collection.\n\n## Query Parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| `limit` | integer | No | Controls the maximum number of books returned in the response. If not specified, the API may return a default number of results. |\n\n## Response Format\n\n### Success Response (200 OK)\n\nThe endpoint returns a JSON array of book objects. Each book object contains the following properties:\n\n- **id** (string): Unique identifier for the book (UUID format)\n    \n- **title** (string): The title of the book\n    \n- **author** (string): The author's name\n    \n- **genre** (string): The genre/category of the book\n    \n- **yearPublished** (integer): The year the book was published\n    \n- **checkedOut** (boolean): Indicates whether the book is currently checked out\n    \n- **isPermanentCollection** (boolean): Indicates if the book is part of the permanent collection\n    \n- **createdAt** (string): Timestamp of when the book record was created (ISO 8601 format)\n    \n\n### Example Response\n\n``` json\n[\n  {\n    \"id\": \"a0d7854d-4f37-447f-856a-5d920e7a0196\",\n    \"title\": \"To Kill a Mockingbird\",\n    \"author\": \"Harper Lee\",\n    \"genre\": \"fiction\",\n    \"yearPublished\": 1960,\n    \"checkedOut\": false,\n    \"isPermanentCollection\": false,\n    \"createdAt\": \"2026-03-25T12:40:14.700Z\"\n  }\n]\n\n ```\n\n## Saved Examples\n\nThis request includes saved examples demonstrating different scenarios:\n\n- **Success**: Shows a successful response with a 200 OK status and an array of book objects\n    \n- **Internal Server Error**: Demonstrates error handling when the server encounters an issue (500 status)\n    \n\nThese examples can be used for testing, documentation, and powering mock servers."
            },
