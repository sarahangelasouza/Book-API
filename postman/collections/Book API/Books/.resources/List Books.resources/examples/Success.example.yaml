              "description": "Retrieves a list of all overdue books from the library system. An overdue book is one that has been checked out past its due date.\n\n**Method & URL**\n`GET {{mockUrl}}/books/overdue`\n\n**Authentication**\n\nThis endpoint requires an API key stored in the vault. The key is referenced as `vault:library-api-key` and must be provided with each request.\n\n**Response**\n\nOn success, the endpoint returns an array of overdue book objects. Each object contains the following fields:\n\n| Field | Description |\n|---|---|\n| `id` | Unique identifier for the book |\n| `title` | Title of the book |\n| `dueDate` | The date the book was due to be returned |\n| `daysOverdue` | Number of days the book is past its due date |\n| `author` | Author of the book |\n| `genre` | Genre or category of the book |\n| `isbn` | International Standard Book Number |\n| `isCheckedOut` | Boolean indicating whether the book is currently checked out |\n| `checkedOutBy` | Name or identifier of the patron who has the book |\n| `checkedOutDate` | The date the book was checked out |\n\n**Status Codes**\n\n- `200 OK` — Request was successful. Returns an array of overdue book objects.\n- `401 Unauthorized` — Authentication failed or the API key is missing/invalid. Returns an error object with the following fields:\n  - `error` — A short error code or type.\n  - `message` — A human-readable description of the error."
