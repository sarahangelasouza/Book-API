$kind: http-example
request:
  url: "{{baseUrl}}/books/:id"
  method: PUT
  headers:
    Content-Type: application/json
  pathVariables:
    id: "{{bookID}}"
  body:
    type: json
    content: |-
      {
          "title": "The Great Gatsby (Updated)",
          "author": "F. Scott Fitzgerald",
          "year": 1925
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: json
    content: |-
      {
          "error": {
              "code": 500,
              "message": "Internal Server Error"
          }
      }
order: 2000
