$kind: http-request
name: Create Book
method: POST
url: "{{baseUrl}}/books"
description: Creates a new book. Requires `title` and `author`. `year` is optional.
examples: .resources/Create Book.resources/examples
order: 3000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "title": "{{tempBookTitle}}",
        "author": "{{$randomFirstName}} {{$randomLastName}}",
        "genre": "fiction",
        "yearPublished": "1987"
    }
