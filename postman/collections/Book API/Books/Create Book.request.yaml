$kind: http-request
description: Creates a new book. Requires `title` and `author`. `year` is optional.
url: "{{baseUrl}}/books"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "title": "{{tempBookTitle}}",
        "author": "{{$randomFirstName}} {{$randomLastName}}",
        "genre": "fiction",
        "yearPublished": "1987"
    }
order: 3000
