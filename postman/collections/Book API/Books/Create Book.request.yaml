$kind: http-request
description: Creates a new book. Requires `title` and `author`. `year` is optional.
url: "{{baseUrl}}/books"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "title": "<string>",
      "author": "<string>",
      "genre": "<string>",
      "yearPublished": "<integer>"
    }
examples: ./.resources/Create Book.resources/examples
order: 2000
