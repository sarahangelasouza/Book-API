$kind: http-example
request:
  url: "{{baseUrl}}/books/:id"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: id
      value: <string>
      description: The unique identifier of the book.
  body:
    type: json
    content: |-
      {
        "title": "<string>",
        "author": "<string>",
        "genre": "<string>",
        "yearPublished": "<integer>"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "<integer>",
          "message": "<string>"
        }
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "error": {
            "type": "object",
            "properties": {
              "code": {
                "type": "integer",
                "example": 400,
                "description": "HTTP status code."
              },
              "message": {
                "type": "string",
                "example": "Bad Request",
                "description": "Error message."
              }
            }
          }
        }
      }
order: 2000
