$kind: http-request
description: Updates an existing book by ID. Fields `title`, `author`, `year` are all optional.
url: "{{baseUrl}}/books/:id"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: 7f04875b-9201-4c8f-b381-18370f9b2dfb
    description: The unique identifier of the book.
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "description": "Unique identifier for a book.",
            "type": "string",
            "example": "7f04875b-9201-4c8f-b381-18370f9b2dfb"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "title": "The Great Gatsby (Updated)",
      "author": "F. Scott Fitzgerald",
      "year": 1925
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "title": {
          "type": "string",
          "example": "The Great Gatsby",
          "description": "The title of the book."
        },
        "author": {
          "type": "string",
          "example": "F. Scott Fitzgerald",
          "description": "The author of the book."
        },
        "genre": {
          "type": "string",
          "example": "fiction",
          "description": "The genre of the book."
        },
        "yearPublished": {
          "type": "integer",
          "example": 1925,
          "description": "The year the book was published."
        }
      },
      "required": [
        "title",
        "author"
      ]
    }
examples: ./.resources/Update Book.resources/examples
order: 2000
