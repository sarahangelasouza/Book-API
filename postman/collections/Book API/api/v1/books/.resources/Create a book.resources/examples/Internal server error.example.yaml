$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/books"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "title": "<string>",
        "author": "<string>",
        "year": "<integer>"
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "error": {
              "name": "<string>",
              "message": "<string>"
          }
      }
order: 3000
