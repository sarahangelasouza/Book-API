$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/books"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "title": "<string>",
        "author": "<string>",
        "year": "<integer>"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "error": {
          "name": "<string>",
          "message": "<string>"
        }
      }
order: 2000
