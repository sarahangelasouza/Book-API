$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/books/:id"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: id
      value: <string>
      description: Book ID
  body:
    type: json
    content: |-
      {
        "title": "<string>",
        "author": "<string>",
        "year": "<integer>"
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "error": {
          "name": "<string>",
          "message": "<string>"
        }
      }
order: 3000
