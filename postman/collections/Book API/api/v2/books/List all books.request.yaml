$kind: http-request
url: "{{baseUrl}}/api/v1/books"
method: GET
headers:
  Accept: application/json
body:
  type: text
  content: ""
examples: ./.resources/List all books.resources/examples
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // 1. Status code is 200
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      // 2. Response has a `books` property
      pm.test("Response has a 'books' property", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("books");
      });

      // 3. `books` is an array
      pm.test("'books' is an array", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.books).to.be.an("array");
      });

      // 4. Each book object has the properties: id, title, author, year
      pm.test("Each book has id, title, author, and year properties", function () {
          const jsonData = pm.response.json();
          jsonData.books.forEach(function (book) {
              pm.expect(book).to.have.property("id");
              pm.expect(book).to.have.property("title");
              pm.expect(book).to.have.property("author");
              pm.expect(book).to.have.property("year");
          });
      });

      // 5. Response time is under 1000ms
      pm.test("Response time is under 1000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });

      // 6. Content-Type header contains application/json
      pm.test("Content-Type header contains application/json", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });
