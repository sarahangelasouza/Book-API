$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/books/:id"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: id
      value: <string>
      description: Book ID
  body:
    type: json
    content: |-
      {
        "title": "<string>",
        "author": "<string>",
        "year": "<integer>"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "book": {
              "id": "<string>",
              "title": "<string>",
              "author": "<string>",
              "year": "<integer>"
          }
      }
order: 1000
