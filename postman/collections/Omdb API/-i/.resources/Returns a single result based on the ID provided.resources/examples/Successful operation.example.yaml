$kind: http-example
request:
  url: "{{baseUrl}}/?i=string&plot=short&r=json&callback=string&apikey=<API Key>"
  method: GET
  queryParams:
    - key: i
      value: string
      description: A valid IMDb ID (e.g. tt0000001)
    - key: plot
      value: short
      description: Return short or full plot
    - key: r
      value: json
      description: The response type to return
    - key: callback
      value: string
      description: JSONP callback name
    - key: apikey
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
