$kind: http-request
url: "{{baseUrl}}/?i&i=string&plot=short&r=json&callback=string"
method: GET
queryParams:
  - key: i
    value: null
  - key: i
    value: string
    description: A valid IMDb ID (e.g. tt0000001)
  - key: plot
    value: short
    description: Return short or full plot
  - key: r
    value: json
    description: The response type to return
  - key: callback
    value: string
    description: JSONP callback name
body:
  type: text
  content: ""
auth:
  type: apikey
  credentials:
    key: apikey
    value: "{{apiKey}}"
    in: query
examples: ./.resources/Returns a single result based on the ID provided.resources/examples
order: 1000
