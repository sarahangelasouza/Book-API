$kind: http-request
url: "{{baseUrl}}/?s&s=string&y=2099&type=series&r=json&page=2099&callback=string"
method: GET
queryParams:
  - key: s
    value: null
  - key: s
    value: string
    description: Title of movie or series
  - key: y
    value: "2099"
    description: Year of release
  - key: type
    value: series
    description: Return movie or series
  - key: r
    value: json
    description: The response type to return
  - key: page
    value: "2099"
    description: Page number to return
  - key: callback
    value: string
    description: JSONP callback name
body:
  type: text
  content: ""
auth:
  type: apikey
  credentials:
    key: apikey
    value: "{{apiKey}}"
    in: query
examples: ./.resources/Returns an array of results for a given title.resources/examples
order: 1000
