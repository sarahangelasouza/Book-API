$kind: http-request
url: "{{baseUrl}}/?t&t=string&y=2099&type=series&plot=short&r=json&callback=string"
method: GET
queryParams:
  - key: t
    value: null
  - key: t
    value: string
    description: Title of movie or series
  - key: y
    value: "2099"
    description: Year of release
  - key: type
    value: series
    description: Return movie or series
  - key: plot
    value: short
    description: Return short or full plot
  - key: r
    value: json
    description: The response type to return
  - key: callback
    value: string
    description: JSONP callback name
body:
  type: text
  content: ""
auth:
  type: apikey
  credentials:
    key: apikey
    value: "{{apiKey}}"
    in: query
examples: ./.resources/Returns the most popular match for a given title.resources/examples
order: 1000
