$kind: http-example
request:
  url: "{{baseUrl}}/?t=string&y=2099&type=series&plot=short&r=json&callback=string&apikey=<API Key>"
  method: GET
  queryParams:
    - key: t
      value: string
      description: Title of movie or series
    - key: y
      value: "2099"
      description: Year of release
    - key: type
      value: series
      description: Return movie or series
    - key: plot
      value: short
      description: Return short or full plot
    - key: r
      value: json
      description: The response type to return
    - key: callback
      value: string
      description: JSONP callback name
    - key: apikey
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: text
    content: ""
response:
  statusCode: 401
  statusText: Unauthorized
  body:
    type: text
    content: ""
order: 2000
