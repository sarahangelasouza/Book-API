$kind: collection
description: |-
  # Getting Started

  ## Step 1: Fork the collection using Run in Postman

  [](https://god.gw.postman.com/run-collection/19024122-92a85d0e-51e7-47da-9f83-c45dcb1cdf24?action=collection/fork&collection-url=entityId=19024122-92a85d0e-51e7-47da-9f83-c45dcb1cdf24&entityType=collection&workspaceId=345300e6-346e-42e0-aed1-53717919aef0#?env%5BPayPal%20Override%20Env%)

  [<img src="https://run.pstmn.io/button.svg">](https://god.gw.postman.com/run-collection/19024122-92a85d0e-51e7-47da-9f83-c45dcb1cdf24?action=collection/fork&collection-url=entityId=19024122-92a85d0e-51e7-47da-9f83-c45dcb1cdf24&entityType=collection&workspaceId=345300e6-346e-42e0-aed1-53717919aef0#?env%5BPayPal%20Override%20Env%)

  ## Step 2: Get your access token

  An access token is automatically generated using a default `client_id` and `secret`. PayPal recommends using your own `client_id` and `secret` from the [Developer Dashboard](https://www.paypal.com/signin?intent=developer&returnUri=https%3A%2F%2Fdeveloper.paypal.com%2Fdeveloper%2Fapplication) by entering the values under the **Variables** tab. A pre-request script will generate and manage the `access_token` automatically.

  > **Note:** Your developer account `client_id` and `secret` may have a different scope than the default `client_id` and `secret`. 
    

  ## Step 3: Make your first API call

  PayPal recommends starting with the Orders API. These steps will use the Orders API to create an order and capture payment using [sandbox accounts](https://developer.paypal.com/developer/accounts) linked to your Developer Dashboard account.

  To create an order:

  1. In your workspace, navigate to your fork of the PayPal collection.
      
  2. Select **Orders > Create Order**.
      
  3. Select the **Send** button to create the order. On a successful call, the API returns a 201 order created response code.
      
  4. In the response, find the **payer-action** link if you created an order with `payment_source.paypal` or **approve** link if you created an order without payment source.
      
  5. Open the **approve** or **payer-action** link in a browser.
      
  6. Log in with your Developer Dashboard Sandbox Personal Account credentials. You can find those credentials by logging into the Developer Dashboard and selecting **Sandbox > Account**.
      
  7. Select the **Continue** button. Payment has now been made.
      

  To capture payment:

  1. In the response of the order you created, find the `order_id`.
      
  2. In the **Variables** tab, enter the `order_id` number.
      
  3. Select **Orders > Capture payment for order**.
      
  4. Select **Send**. On a successful call, the API returns a 201 order created response code.
      

  Your order has been created and payment has been captured. You can verify the transaction in both the sandbox personal account and the sandbox business account.

  <img src="https://www.paypalobjects.com/devdoc/transaction-details-buyer.png" alt="Buyer Payment Verification">

  <img src="https://www.paypalobjects.com/devdoc/transaction-details-seller.png" alt="Seller Payment Verification">
