$kind: http-example
request:
  url: "{{base_url}}/v1/oauth2/token/terminate"
  method: POST
  body:
    type: urlencoded
    content:
      - key: token
        value: "{{access_token}}"
      - key: token_type_hint
        value: ACCESS_TOKEN
      - key: grant_type
        value: client_credentials
        disabled: true
      - key: grant_type
        value: refresh_token
        disabled: true
      - key: refresh_token
        value: "{{refresh_token}}"
        disabled: true
      - key: grant_type
        value: authorization_code
        disabled: true
      - key: code
        value: "{{authorization_code}}"
        disabled: true
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Length: "0"
    Connection: keep-alive
    Date: Thu, 17 Feb 2022 17:59:11 GMT
    Cache-Control: max-age=0, no-cache, no-store, must-revalidate
    Paypal-Debug-Id: 2584a951c74e9
    X-Paypal-Token-Service: IAAS
    Strict-Transport-Security: max-age=31536000; includeSubDomains
  body:
    type: text
    content: ""
order: 1000
