$kind: http-example
request:
  url: "{{base_url}}/v1/oauth2/token/terminate"
  method: POST
  body:
    type: urlencoded
    content:
      - key: token
        value: "{{access_token}}"
        disabled: true
      - key: token_type_hint
        value: ACCESS_TOKEN
      - key: grant_type
        value: client_credentials
        disabled: true
      - key: grant_type
        value: refresh_token
        disabled: true
      - key: refresh_token
        value: "{{refresh_token}}"
        disabled: true
      - key: grant_type
        value: authorization_code
        disabled: true
      - key: code
        value: "{{authorization_code}}"
        disabled: true
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Connection: keep-alive
    Content-Length: "116"
    Content-Type: application/json
    Server: nginx/1.14.0 (Ubuntu)
    Cache-Control: max-age=0, no-cache, no-store, must-revalidate
    Paypal-Debug-Id: 4600bf5cce0e9
    X-Paypal-Token-Service: IAAS
    Strict-Transport-Security: max-age=31536000; includeSubDomains
    Edge-Control: max-age=0
    Accept-Ranges: bytes
    Date: Wed, 05 Apr 2023 17:33:28 GMT
    Via: 1.1 varnish
    X-Served-By: cache-chi-kigq8000129-CHI
    X-Cache: MISS
    X-Cache-Hits: "0"
    X-Timer: S1680716008.127570,VS0,VE209
  body:
    type: json
    content: |-
      {
          "error": "invalid_token",
          "error_description": "Both the access token and device information were missing or invalid"
      }
order: 2000
