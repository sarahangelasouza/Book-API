$kind: http-request
url: "{{base_url}}/v1/oauth2/token/terminate"
method: POST
body:
  type: urlencoded
  content:
    - key: token
      value: "{{access_token}}"
    - key: token_type_hint
      value: ACCESS_TOKEN
    - key: grant_type
      value: client_credentials
      disabled: true
    - key: grant_type
      value: refresh_token
      disabled: true
    - key: refresh_token
      value: "{{refresh_token}}"
      disabled: true
    - key: grant_type
      value: authorization_code
      disabled: true
    - key: code
      value: "{{authorization_code}}"
      disabled: true
scripts:
  - type: afterResponse
    code: |-
      pm.test("clear cached access_token", function () {
          pm.collectionVariables.unset('access_token');
      });
    language: text/javascript
settings:
  disabledSystemHeaders:
    - content-type
examples: ./.resources/Terminate access_token.resources/examples
order: 2000
