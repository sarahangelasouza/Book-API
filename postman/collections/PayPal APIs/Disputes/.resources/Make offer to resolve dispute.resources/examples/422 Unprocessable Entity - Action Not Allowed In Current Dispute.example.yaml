  pathVariables:
    dispute_id: "{{dispute_id}}"
  body:
    type: json
    content: |-
      {
          "note": "Offer refund with replacement item.",
          "offer_amount": {
              "currency_code": "USD",
              "value": "23"
          },
          "offer_type": "REFUND_WITH_REPLACEMENT"
      }
