request:
  url: "{{base_url}}/v1/customer/disputes/:dispute_id/provide-evidence"
  method: POST
  headers:
    Content-Type: multipart/form-data
  pathVariables:
    dispute_id: "{{dispute_id}}"
  body:
    type: formdata
    content:
      - type: file
        key: evidence-file
        src: /Users/sdarshale/Downloads/TestEvidence.pdf
        description: A file with evidence.
