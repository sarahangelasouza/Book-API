scripts:
  - type: afterResponse
    code: |-
      pm.test("Extract resource_id", function() {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('id');
          pm.collectionVariables.set("invoice_id", jsonData.id);
      });

      //Clearing draft_invoice_number to avoid duplicate invoice number issue.
      pm.collectionVariables.unset("draft_invoice_number");
    language: text/javascript
  - type: beforeRequest
    code: |-
      if(!pm.collectionVariables.has("draft_invoice_number")) {
          console.log("draftInvoiceNumber is not defined. Setting timestamp along with random integer in draft_invoice_number");
          //To avoid duplicate invoice number issue, adding random int along with timestamp.
          pm.collectionVariables.set("draft_invoice_number", pm.variables.replaceIn("{{$timestamp}}{{$randomInt}}"));
      }
    language: text/javascript
examples: ./.resources/Create draft invoice.resources/examples
order: 2000
