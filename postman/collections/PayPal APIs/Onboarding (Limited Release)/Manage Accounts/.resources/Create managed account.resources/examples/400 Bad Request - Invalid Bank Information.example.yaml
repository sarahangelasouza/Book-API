      description: (Optional)The preferred server response upon successful processing of the request. Value is:<ul><li><code>return=minimal</code>. The server returns a minimal response to optimize communication between the API caller and the server. A minimal response includes the <code>account_id</code>, <code>external_id</code>, and HATEOAS links.</li><li><code>return=representation</code>. The server returns a complete resource representation without `process_view`.</li><li><code>return=representation, views=process_view</code>. The server returns complete resource representation along with `process_view` which includes policies information along with data/documents requirement to fulfill those.</li><li><code>views=process_view</code>. The server returns complete resource representation along with `process_view` which includes policies information along with data/documents requirement to fulfill those.</li></ul>
