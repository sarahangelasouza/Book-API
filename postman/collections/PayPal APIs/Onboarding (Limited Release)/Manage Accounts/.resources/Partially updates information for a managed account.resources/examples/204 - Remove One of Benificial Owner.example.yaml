request:
  url: "{{base_url}}/v3/customer/managed-accounts/:id"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
      description: |
        The Content-Type header field is used to specify the nature of the data in the body of an entity. PayPal REST APIs support application/json.
    - key: Accept
      value: application/json
      description: |
        The Accept header field is used to specify the form of response that can be understand and processed
    - key: Prefer
      value: return=minimal
      disabled: true
      description: (Optional)The server returns a minimal response to optimize communication between the API caller and the server. A minimal response includes the account_id, external_id, and HATEOAS links.
    - key: Prefer
      value: return=representation
      disabled: true
      description: (Optional) The server returns a complete resource representation without process_view
    - key: Prefer
      value: return=representation, views=process_view
      description: (Optional)The server returns complete resource representation along with process_view which includes policies information along with data/documents requirement to fulfill those.
    - key: Prefer
      value: views=process_view
      disabled: true
      description: (Optional)The server returns complete resource representation along with process_view which includes policies information along with data/documents requirement to fulfill those.
  pathVariables:
    - key: id
      value: "{{managed_path_account_id}}"
      description: The ID of the seller.
  body:
    type: json
    content: |-
      [
          {
              "op": "remove",
              "path": "/business_entity/beneficial_owners/individuals/@id=='CDG4L3EQDRMB2'"
          }
      ]
