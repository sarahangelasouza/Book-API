$kind: http-example
name: 200 - [EKYC Failed/Document Required] Get Account with Process View
request:
  url: "{{base_url}}/v3/customer/managed-accounts?external_id={{managed_path_external_id}}"
  method: GET
  queryParams:
    - key: external_id
      value: "{{managed_path_external_id}}"
      description: |+
        The `external_id` query parameter can be used to request managed accounts with the given external_id. Searches for the managed account that has the given external_id. To locate a particular account, you should set this to the same value that you provided in the /external_id property in your Create Managed Account request.

    - key: views
      value: process_view
      disabled: true
      description: (Optional) The `views` query parameter can be used to request `process_view` in addition to the default GET response. A comma-separated list of data sets that should be returned in the response. The only allowed value here is process_view, which indicates that the process_view property should be populated in the response; this property contains information on the regulatory processes that must be completed for this merchant.
