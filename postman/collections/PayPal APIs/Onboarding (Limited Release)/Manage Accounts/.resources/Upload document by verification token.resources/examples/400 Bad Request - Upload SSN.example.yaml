        value: '{"document_type":"BUSINESS_EXISTENCE"}'
        disabled: true
      - type: text
        key: document_info
        value: '{"document_type":"DRIVERS_LICENSE"}'
        disabled: true
      - type: text
        key: document_info
        value: '{"document_type":"PASSPORT"}'
        disabled: true
      - type: text
        key: document_info
        value: '{"document_type":"PROOF_OF_ADDRESS"}'
        disabled: true
      - type: text
        key: document_info
        value: '{"document_type":"SSN"}'
