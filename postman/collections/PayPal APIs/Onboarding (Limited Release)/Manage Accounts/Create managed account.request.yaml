scripts:
  - type: afterResponse
    code: |-
      
      var jsonData = JSON.parse(responseBody);

      pm.test("response should be okay to process", function () { 
          pm.response.to.not.be.error; 
          pm.response.to.not.have.jsonBody(""); 
          pm.response.to.not.have.jsonBody("error"); 
      });

      pm.test("Extract Account Id", function() {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('account_id');
          pm.collectionVariables.set("managed_path_account_id", jsonData.account_id);
      });

      pm.test("Extract individual_owners Id", function() {
          var jsonData = pm.response.json();
          pm.expect(jsonData.individual_owners[0]).to.have.property('id');
            pm.collectionVariables.set("managed_path_person_id", jsonData.individual_owners[0].id);
      });

      pm.test("Extract External Id", function() {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('external_id');
          pm.collectionVariables.set("managed_path_external_id", jsonData.external_id);
      });

      if(!pm.collectionVariables.get("managed_path_external_id")) {
          //Skipping remaining MAM API calls when external id is not available
          pm.execution.setNextRequest("Create a setup token");
      }
    language: text/javascript
