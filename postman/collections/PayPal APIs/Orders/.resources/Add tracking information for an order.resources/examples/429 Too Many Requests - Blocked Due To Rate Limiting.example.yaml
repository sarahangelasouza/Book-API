    Content-Length: "409"
    Content-Type: application/json
    Server: nginx
    Access-Control-Expose-Headers: Server-Timing
    Cache-Control: max-age=0, no-cache, no-store, must-revalidate
    Paypal-Debug-Id: f288055697704
    Server-Timing: traceparent;desc="00-0000000000000000000f288055697704-d2be2ab0b48233b9-01"
    Traceparent: 00-0000000000000000000f288055697704-88f422cd8c8f2a9a-01
    HTTP_X_PP_AZ_LOCATOR: ccg18.slc
    Strict-Transport-Security: max-age=31536000; includeSubDomains
    Accept-Ranges: bytes
    Via: 1.1 varnish, 1.1 varnish
    Edge-Control: max-age=0
    Date: Tue, 13 May 2025 17:43:34 GMT
    X-Served-By: cache-sjc10059-SJC, cache-lax-kwhp1940079-LAX
    X-Cache: MISS, MISS
    X-Cache-Hits: 0, 0
    X-Timer: S1747158214.297817,VS0,VE187
    Vary: Accept-Encoding
