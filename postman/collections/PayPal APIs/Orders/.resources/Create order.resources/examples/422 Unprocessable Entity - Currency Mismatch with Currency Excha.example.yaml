$kind: http-example
name: 422 Unprocessable Entity - Currency Mismatch with Currency Exchange Quote
request:
  url: "{{base_url}}/v2/checkout/orders"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
      description: The Content-Type header field is used to specify the nature of the data in the body of an entity. PayPal REST APIs support application/json.
    - key: Prefer
      value: "{{prefer_representation_detailed}}"
      description: The preferred server response upon successful completion of the request. Value is:<ul><li><code>return=minimal</code>. The server returns a minimal response to optimize communication between the API caller and the server. A minimal response includes the <code>id</code>, <code>status</code> and HATEOAS links.</li><li><code>return=representation</code>. The server returns a complete resource representation, including the current state of the resource.</li></ul>
    - key: PayPal-Request-Id
      value: "{{$guid}}"
      description: The server stores keys for 6 hours. The API callers can request the times to up to 72 hours by speaking to their Account Manager.
    - key: PayPal-Client-Metadata-Id
      value: "{{paypal_client_metadata_Id}}"
      disabled: true
      description: Optional. Verifies that the payment originates from a valid, user-consented device and application. Reduces fraud and decreases declines. Transactions that do not include a client metadata ID are not eligible for PayPal Seller Protection.
    - key: PayPal-Partner-Attribution-Id
      value: "{{paypal_partner_attribution_id}}"
      disabled: true
      description: Optional. Identifies the caller as a PayPal partner. To receive revenue attribution, specify a unique build notation (BN) code. BN codes provide tracking on all transactions that originate or are associated with a particular partner. To find your BN code, see Code and Credential Reference.
    - key: PayPal-Auth-Assertion
      value: "{{paypal_auth_assertion}}"
      disabled: true
      description: |+
        An API client-provided JSON Web Token (JWT) assertion that identifies the merchant. To use this header, you must get consent to act on behalf of a merchant.

    - key: PayPal-Mock-Response
      value: '{ "mock_application_codes": "{{mock_issue}}" }'
      disabled: true
      description: For a list of error codes to test for see https://developer.paypal.com/api/rest/reference/orders/v2/errors/#link-createorder
  body:
    type: json
    content: |-
      {
          "intent": "{{order_intent}}",
          "payment_source": {
              "paypal": {
                  "experience_context": {
                      "return_url": "https://developer.paypal.com",
                      "cancel_url": "https://www.bing.com",
                      "user_action": "PAY_NOW"
                  }
              }
          },
          "purchase_units": [
              {
                  "amount": {
                      "currency_code": "USD",
                      "value": "16.80"
                  },
                   "payment_instruction": {
                      "payee_receivable_fx_rate_id": "{{fx_id}}"
                   }
              }
          ]
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity
  headers:
    Connection: keep-alive
    Content-Length: "776"
    Content-Type: application/json
    Server: nginx
    Access-Control-Expose-Headers: Server-Timing
    Cache-Control: max-age=0, no-cache, no-store, must-revalidate
    Paypal-Debug-Id: f372842b1765e
    Server-Timing: traceparent;desc="00-0000000000000000000f372842b1765e-21b1494546628281-01"
    HTTP_X_PP_AZ_LOCATOR: ccg18.slc
    Strict-Transport-Security: max-age=31536000; includeSubDomains
    Accept-Ranges: bytes
    Via: 1.1 varnish, 1.1 varnish
    Edge-Control: max-age=0
    Date: Mon, 17 Nov 2025 07:49:29 GMT
    X-Served-By: cache-qpg1226-QPG, cache-maa10228-MAA
    X-Cache: MISS, MISS
    X-Cache-Hits: 0, 0
    X-Timer: S1763365768.301131,VS0,VE1368
    Vary: Accept-Encoding
  body:
    type: text
    content: |-
      {
          "name": "UNPROCESSABLE_ENTITY",
          "details": [
              {
                  "field": "/purchase_units/@reference_id==default/payment_instruction/payee_receivable_fx_rate_id",
                  "location": "body",
                  "issue": "PAYEE_FX_RATE_ID_CURRENCY_MISMATCH",
                  "description": "The specified FX Rate ID is for a currency that does not match with the currency of this request. Please specify a different FX Rate ID and try the request again. Alternately, remove the FX Rate ID to process the request using the default exchange rate."
              }
          ],
          "message": "The requested action could not be performed, semantically incorrect, or failed business validation.",
          "debug_id": "f372842b1765e",
          "links": [
              {
                  "href": "https://developer.paypal.com/api/rest/reference/orders/v2/errors/#PAYEE_FX_RATE_ID_CURRENCY_MISMATCH",
                  "rel": "information_link",
                  "method": "GET"
              }
          ]
      }
order: 15000
