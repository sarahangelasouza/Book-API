$kind: http-example
request:
  url: "{{base_url}}/v3/vault/payment-tokens"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
      description: The Content-Type header field is used to specify the nature of the data in the body of an entity. PayPal REST APIs support application/json.
    - key: PayPal-Request-Id
      value: "{{$guid}}"
      description: The server stores keys for 6 hours. The API callers can request the times to up to 72 hours by speaking to their Account Manager.
    - key: PayPal-Auth-Assertion
      value: "{{paypal_auth_assertion}}"
      disabled: true
      description: |
        An API client-provided JSON Web Token (JWT) assertion that identifies the merchant. To use this header, you must get consent to act on behalf of a merchant.
  body:
    type: json
    content: |-
      {
          "payment_source": {
              "card": {
                  "number": "{{card_number}}",
                  "brand": "VISA",
                  "expiry": "2027-02",
                  "name": "John Doe",
                  "billing_address": {
                      "address_line_1": "2211 N First Street",
                      "address_line_2": "17.3.160",
                      "admin_area_2": "San Jose",
                      "admin_area_1": "CA",
                      "postal_code": "95131",
                      "country_code": "US"
                  }
              }
          }
      }
response:
  statusCode: 403
  statusText: Forbidden
  body:
    type: json
    content: |-
      {
          "name": "NOT_AUTHORIZED",
          "message": "Authorization failed due to insufficient permissions.",
          "debug_id": "360ee42996992",
          "details": [
              {
                  "issue": "NOT_ENABLED_FOR_VAULT",
                  "description": "The API caller or the merchant on whose behalf the API call is initiated is not enabled to vault."
              }
          ],
          "links": [
              {
                  "href": "https://developer.paypal.com/docs/limited-release/payment-tokens/v3/api/#error-NOT_ENABLED_FOR_VAULT",
                  "rel": "information_link",
                  "method": "GET"
              }
          ]
      }
order: 5000
