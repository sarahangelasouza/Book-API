$kind: http-example
request:
  url: "{{base_url}}/v3/vault/payment-tokens"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
      description: The Content-Type header field is used to specify the nature of the data in the body of an entity. PayPal REST APIs support application/json.
    - key: PayPal-Request-Id
      value: "{{$guid}}"
      description: The server stores keys for 6 hours. The API callers can request the times to up to 72 hours by speaking to their Account Manager.
    - key: PayPal-Auth-Assertion
      value: "{{paypal_auth_assertion}}"
      disabled: true
      description: |
        An API client-provided JSON Web Token (JWT) assertion that identifies the merchant. To use this header, you must get consent to act on behalf of a merchant.
  body:
    type: json
    content: |-
      {
          "payment_source": {
              "token": {
                  "id": "4BD1763VB2781894",
                  "type": "SETUP_TOKEN"
              }
          }
      }
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: json
    content: |-
      {
          "name": "RESOURCE_NOT_FOUND",
          "message": "The specified resource does not exist.",
          "debug_id": "b25def236f535",
          "details": [
              {
                  "issue": "TOKEN_NOT_FOUND",
                  "description": "The specified token id does not exist."
              }
          ],
          "links": [
              {
                  "href": "https://developer.paypal.com/docs/limited-release/payment-tokens/v3/api/#error-INVALID_RESOURCE_ID",
                  "method": "GET"
              }
          ]
      }
order: 6000
