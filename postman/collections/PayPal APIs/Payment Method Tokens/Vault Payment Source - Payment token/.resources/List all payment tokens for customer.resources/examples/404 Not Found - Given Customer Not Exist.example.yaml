$kind: http-example
request:
  url: "{{base_url}}/v3/vault/payment-tokens?customer_id=UMzpHwoBUi"
  method: GET
  headers:
    - key: Content-Type
      value: application/json
      description: The Content-Type header field is used to specify the nature of the data in the body of an entity. PayPal REST APIs support application/json.
    - key: PayPal-Request-Id
      value: "{{$guid}}"
      description: The server stores keys for 6 hours. The API callers can request the times to up to 72 hours by speaking to their Account Manager.
    - key: PayPal-Auth-Assertion
      value: "{{paypal_auth_assertion}}"
      disabled: true
      description: |
        An API client-provided JSON Web Token (JWT) assertion that identifies the merchant. To use this header, you must get consent to act on behalf of a merchant.
  queryParams:
    - key: customer_id
      value: UMzpHwoBUi
      description: (Required) A unique identifier representing a specific customer in merchant's/partner's system or records.
    - key: page_size
      value: "5"
      disabled: true
      description: A non-negative, non-zero integer indicating the maximum number of results to return at one time.
    - key: page
      value: "1"
      disabled: true
      description: A non-negative, non-zero integer representing the page of the results.
    - key: total_required
      value: "false"
      disabled: true
      description: A boolean indicating total number of items (total_items) and pages (total_pages) are expected to be returned in the response.
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: json
    content: |-
      {
          "name": "RESOURCE_NOT_FOUND",
          "message": "The specified resource does not exist.",
          "debug_id": "888d3ce59bbf5",
          "details": [],
          "links": [
              {
                  "href": "https://developer.paypal.com/docs/limited-release/payment-tokens/v3/api/#error-INVALID_RESOURCE_ID",
                  "method": "GET"
              }
          ]
      }
order: 4000
