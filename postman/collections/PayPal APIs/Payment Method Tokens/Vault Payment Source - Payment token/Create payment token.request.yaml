$kind: http-request
description: Creates a Payment Token from the given payment source and adds it to the Vault of the associated customer.
url: "{{base_url}}/v3/vault/payment-tokens"
method: POST
headers:
  - key: Content-Type
    value: application/json
    description: The Content-Type header field is used to specify the nature of the data in the body of an entity. PayPal REST APIs support application/json.
  - key: PayPal-Request-Id
    value: "{{$guid}}"
    description: The server stores keys for 6 hours. The API callers can request the times to up to 72 hours by speaking to their Account Manager.
  - key: PayPal-Auth-Assertion
    value: "{{paypal_auth_assertion}}"
    disabled: true
    description: |
      An API client-provided JSON Web Token (JWT) assertion that identifies the merchant. To use this header, you must get consent to act on behalf of a merchant.
body:
  type: json
  content: |-
    {
        "payment_source": {
            "token": {
                "id": "{{setup_token_id}}",
                "type": "SETUP_TOKEN"
            }
        }
    }
scripts:
  - type: afterResponse
    code: |-
      var data = pm.response.json();
      pm.test("Response has payment token id", function() {
          pm.expect(data).to.have.property('id');
          pm.collectionVariables.set("payment_token_id", data.id);
      });
      pm.test("Response has customer token id", function() {
          pm.expect(data.customer).to.have.property('id');
          pm.collectionVariables.set("vault_customer_id", data.customer.id);
      });
    language: text/javascript
  - type: beforeRequest
    code: |
      //These test card numbers comes from here - https://developer.paypal.com/braintree/docs/guides/credit-cards/testing-go-live/java
      var cards = [
