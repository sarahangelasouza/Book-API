$kind: http-example
request:
  url: "{{base_url}}/v3/vault/setup-tokens"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
      description: The Content-Type header field is used to specify the nature of the data in the body of an entity. PayPal REST APIs support application/json.
    - key: PayPal-Request-Id
      value: "{{$guid}}"
      description: The server stores keys for 6 hours. The API callers can request the times to up to 72 hours by speaking to their Account Manager.
    - key: PayPal-Auth-Assertion
      value: "{{paypal_auth_assertion}}"
      disabled: true
      description: |
        An API client-provided JSON Web Token (JWT) assertion that identifies the merchant. To use this header, you must get consent to act on behalf of a merchant.
  body:
    type: json
    content: |-
      {
          "payment_source": {
              "card": {
                  "number": {{card_number}},
                  "expiry": "2027-02"
              }
          }
      }
response:
  statusCode: 201
  statusText: Created
  body:
    type: json
    content: |-
      {
          "id": "3EH94391A48245204",
          "customer": {
              "id": "ezTMcZnMnf"
          },
          "status": "APPROVED",
          "payment_source": {
              "card": {
                  "last_digits": "1111",
                  "expiry": "2027-02"
              }
          },
          "links": [
              {
                  "href": "https://api.sandbox.paypal.com/v3/vault/setup-tokens/3EH94391A48245204",
                  "rel": "self",
                  "method": "GET",
                  "encType": "application/json"
              },
              {
                  "href": "https://api.sandbox.paypal.com/v3/vault/payment-tokens",
                  "rel": "confirm",
                  "method": "POST",
                  "encType": "application/json"
              }
          ]
      }
order: 3000
