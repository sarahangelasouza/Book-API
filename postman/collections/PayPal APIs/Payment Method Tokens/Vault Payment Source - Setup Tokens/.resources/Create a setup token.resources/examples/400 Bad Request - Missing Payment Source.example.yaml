$kind: http-example
request:
  url: "{{base_url}}/v3/vault/setup-tokens"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
      description: The Content-Type header field is used to specify the nature of the data in the body of an entity. PayPal REST APIs support application/json.
    - key: PayPal-Request-Id
      value: "{{$guid}}"
      description: The server stores keys for 6 hours. The API callers can request the times to up to 72 hours by speaking to their Account Manager.
    - key: PayPal-Auth-Assertion
      value: "{{paypal_auth_assertion}}"
      disabled: true
      description: |
        An API client-provided JSON Web Token (JWT) assertion that identifies the merchant. To use this header, you must get consent to act on behalf of a merchant.
  body:
    type: json
    content: |-
      {
          "payment_source": {
          }
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
          "name": "INVALID_REQUEST",
          "message": "Request is not well-formed, syntactically incorrect, or violates schema.",
          "debug_id": "837d78be26ea9",
          "details": [
              {
                  "field": "/payment_source",
                  "value": "class SetupTokenRequestPaymentSource {\n    card: null\n    paypal: null\n    venmo: null\n    applePay: null\n    token: null\n    bank: null\n}",
                  "location": "body",
                  "issue": "EXACTLY_ONE_FIELD_REQUIRED",
                  "description": "exactly one field is required"
              }
          ],
          "links": [
              {
                  "href": "https://developer.paypal.com/docs/limited-release/payment-tokens/v3/api/#error-EXACTLY_ONE_FIELD_REQUIRED",
                  "method": "GET"
              }
          ]
      }
order: 14000
