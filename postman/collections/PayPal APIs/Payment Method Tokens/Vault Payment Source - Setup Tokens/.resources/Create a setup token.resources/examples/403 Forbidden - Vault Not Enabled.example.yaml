$kind: http-example
request:
  url: "{{base_url}}/v3/vault/setup-tokens"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
      description: The Content-Type header field is used to specify the nature of the data in the body of an entity. PayPal REST APIs support application/json.
    - key: PayPal-Request-Id
      value: "{{$guid}}"
      description: The server stores keys for 6 hours. The API callers can request the times to up to 72 hours by speaking to their Account Manager.
    - key: PayPal-Auth-Assertion
      value: "{{paypal_auth_assertion}}"
      disabled: true
      description: |
        An API client-provided JSON Web Token (JWT) assertion that identifies the merchant. To use this header, you must get consent to act on behalf of a merchant.
  body:
    type: json
    content: |-
      {
          "payment_source": {
              "paypal": {
                  "description": "Description for PayPal to be shown to PayPal payer",
                  "shipping": {
                      "name": {
                          "full_name": "John Doe"
                      },
                      "address": {
                          "address_line_1": "2211 N First Street",
                          "address_line_2": "17.3.160",
                          "admin_area_2": "San Jose",
                          "admin_area_1": "CA",
                          "postal_code": "95131",
                          "country_code": "US"
                      }
                  },
                  "permit_multiple_payment_tokens": false,
                  "usage_pattern": "IMMEDIATE",
                  "usage_type": "MERCHANT",
                  "customer_type": "CONSUMER",
                  "experience_context": {
                      "shipping_preference": "SET_PROVIDED_ADDRESS",
                      "payment_method_preference": "IMMEDIATE_PAYMENT_REQUIRED",
                      "brand_name": "EXAMPLE INC",
                      "locale": "en-US",
                      "return_url": "https://example.com/return",
                      "cancel_url": "https://example.com/cancel"
                  }
              }
          }
      }
response:
  statusCode: 403
  statusText: Forbidden
  body:
    type: json
    content: |-
      {
          "status": "403",
          "headers": {
              "Content-Type": "application/json"
          },
          "body": {
              "name": "NOT_AUTHORIZED",
              "message": "Authorization failed due to insufficient permissions.",
              "debug_id": "bb7c4ed5a627c",
              "details": [
                  {
                      "issue": "NOT_ENABLED_TO_VAULT_PAYMENT_SOURCE",
                      "description": "The API caller or the merchant on whose behalf the API call is initiated is not allowed to vault the given source. Please contact PayPal customer support for assistance."
                  }
              ],
              "links": [
                  {
                      "href": "https://developer.paypal.com/docs/limited-release/payment-tokens/v3/api/#error-FORBIDDEN",
                      "rel": "information_link",
                      "method": "GET"
                  }
              ]
          }
      }
order: 15000
