$kind: http-request
description: Cancels an unclaimed payout item, by ID. If no one claims the unclaimed item within 30 days, the API automatically returns the funds to the sender. Use this call to cancel the unclaimed item before the automatic 30-day refund. You can cancel payout items with a <code>transaction_status</code> of <code>UNCLAIMED</code>.
url: "{{base_url}}/v1/payments/payouts-item/:payout_item_id/cancel"
method: POST
headers:
  - key: Content-Type
    value: application/json
    disabled: true
    description: The Content-Type header field is used to specify the nature of the data in the body of an entity. PayPal REST APIs support application/json.
  - key: PayPal-Request-Id
    value: "{{$guid}}"
    disabled: true
    description: The server stores keys for 6 hours. The API callers can request the times to up to 72 hours by speaking to their Account Manager.
  - key: PayPal-Client-Metadata-Id
    value: "{{paypal_client_metadata_Id}}"
    disabled: true
    description: Optional. Verifies that the payment originates from a valid, user-consented device and application. Reduces fraud and decreases declines. Transactions that do not include a client metadata ID are not eligible for PayPal Seller Protection.
  - key: PayPal-Partner-Attribution-Id
    value: "{{paypal_partner_attribution_id}}"
    disabled: true
    description: Optional. Identifies the caller as a PayPal partner. To receive revenue attribution, specify a unique build notation (BN) code. BN codes provide tracking on all transactions that originate or are associated with a particular partner. To find your BN code, see Code and Credential Reference.
  - key: PayPal-Auth-Assertion
    value: "{{paypal_auth_assertion}}"
    disabled: true
    description: |
      An API client-provided JSON Web Token (JWT) assertion that identifies the merchant. To use this header, you must get consent to act on behalf of a merchant.
  - key: Prefer
    value: "{{prefer_representation_detailed}}"
    disabled: true
    description: The preferred server response upon successful completion of the request. Value is:<ul><li><code>return=minimal</code>. The server returns a minimal response to optimize communication between the API caller and the server. A minimal response includes the <code>id</code>, <code>status</code> and HATEOAS links.</li><li><code>return=representation</code>. The server returns a complete resource representation, including the current state of the resource.</li></ul>
  - key: Prefer
    value: "{{prefer_representation_minimal}}"
    disabled: true
    description: The preferred server response upon successful completion of the request. Value is:<ul><li><code>return=minimal</code>. The server returns a minimal response to optimize communication between the API caller and the server. A minimal response includes the <code>id</code>, <code>status</code> and HATEOAS links.</li><li><code>return=representation</code>. The server returns a complete resource representation, including the current state of the resource.</li></ul>
pathVariables:
  - key: payout_item_id
    value: "{{unclaimed_payout_item_id}}"
    description: (Required) The ID of the payout item to cancel.
scripts:
  - type: beforeRequest
    code: |-
      //if unclaimed_payout_item_id is not available, fetch new one 
      if(!pm.variables.get('unclaimed_payout_item_id')) {
          
          //Setting unclaimed_payout_item_id as empty string .
          pm.variables.set('unclaimed_payout_item_id', '');
          
          //Check if payout_batch_id is available
          if(!pm.collectionVariables.get('payout_batch_id')) {
              console.error("payout_batch_id is missing.");
              return;
          }

          if (pm.variables.get('delayed_run')) {
              // If the API is invoked as part of a folder/collection run, we need to wait for the 
              // batch payout that was created in a previous call to finish processing. Testing shows on average it takes 
              // around 40 seconds for the batch to complete processing
              setTimeout(() => {
                  fetchUnclaimedPayoutItem();
              }, 45000); // in milliseconds
          } else {
              fetchUnclaimedPayoutItem();
          }
      }

      function fetchUnclaimedPayoutItem() {
          //This is to get unclaimed payout item id
          pm.sendRequest({
              url: pm.variables.get("base_url") + '/v1/payments/payouts/'+ pm.collectionVariables.get('payout_batch_id'),
              method: 'GET',
              header: {
                  'Authorization': 'Bearer ' + pm.collectionVariables.get("access_token")
              }
          }, (error, response)=> {
              if(response.code === 200) {
                  const jsonData = response.json();
                  if(jsonData && jsonData.items) {
                      const unclaimedPayoutItem = jsonData.items.find(item => item.transaction_status === 'UNCLAIMED');
                      if(unclaimedPayoutItem && unclaimedPayoutItem.payout_item_id) {
                          pm.variables.set('unclaimed_payout_item_id', unclaimedPayoutItem.payout_item_id);
                      } else {
                          console.error("No unclaimed payout_item_id found");
                      }
                  }
              } else {
                  console.error("failed to fetch payout items", error, response)
              }
          });
      }
    language: text/javascript
examples: ./.resources/Cancel unclaimed payout item.resources/examples
order: 4000
