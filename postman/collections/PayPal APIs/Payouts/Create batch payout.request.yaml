$kind: http-request
description: Creates a batch payout. In the JSON request body, pass a `sender_batch_header` and an `items` array. The `sender_batch_header` defines how to handle the payout. The `items` array defines the payout items.<br/>You can make payouts to one or more recipients.<blockquote><strong>Notes:</strong> <ul><li><p>PayPal does not process duplicate payouts. If you specify a <code>sender_batch_id</code> that was used in the last 30 days, the API rejects the request with an error message that shows the duplicate <code>sender_batch_id</code> and includes a HATEOAS link to the original payout with the same <code>sender_batch_id</code>.</p><p>If you receive an HTTP <code>5<i>nn</i></code> status code, you can safely retry the request with the same <code>sender_batch_id</code>.</p></li><li><p>The Payouts API does not support build notation (BN) codes. In a future Payouts release, you can optionally provide BN codes in the <code>PayPal-Partner-Attribution-Id</code> request header.</p><p>For information about the <code>PayPal-Partner-Attribution-Id</code> header, see <a href="https://developer.paypal.com/api/rest/requests/#http-request-headers">HTTP request headers</a>. To learn about or request a BN code, contact your partner manager or see <a href="https://www.paypal.com/us/webapps/mpp/partner-program">PayPal Partner Program</a>.</p></li></ul></blockquote>
url: "{{base_url}}/v1/payments/payouts"
method: POST
headers:
  - key: Content-Type
    value: application/json
    description: The Content-Type header field is used to specify the nature of the data in the body of an entity. PayPal REST APIs support application/json.
  - key: PayPal-Request-Id
    value: "{{$guid}}"
    description: The server stores keys for 30 days.
  - key: PayPal-Client-Metadata-Id
    value: "{{paypal_client_metadata_Id}}"
    disabled: true
    description: Optional. Verifies that the payment originates from a valid, user-consented device and application. Reduces fraud and decreases declines. Transactions that do not include a client metadata ID are not eligible for PayPal Seller Protection.
  - key: PayPal-Partner-Attribution-Id
    value: "{{paypal_partner_attribution_id}}"
    disabled: true
    description: Optional. Identifies the caller as a PayPal partner. To receive revenue attribution, specify a unique build notation (BN) code. BN codes provide tracking on all transactions that originate or are associated with a particular partner. To find your BN code, see Code and Credential Reference.
  - key: PayPal-Auth-Assertion
    value: "{{paypal_auth_assertion}}"
    disabled: true
    description: |
      An API client-provided JSON Web Token (JWT) assertion that identifies the merchant. To use this header, you must get consent to act on behalf of a merchant.
  - key: Prefer
    value: "{{prefer_representation_detailed}}"
    disabled: true
    description: The preferred server response upon successful completion of the request. Value is:<ul><li><code>return=minimal</code>. The server returns a minimal response to optimize communication between the API caller and the server. A minimal response includes the <code>id</code>, <code>status</code> and HATEOAS links.</li><li><code>return=representation</code>. The server returns a complete resource representation, including the current state of the resource.</li></ul>
  - key: Prefer
    value: "{{prefer_representation_minimal}}"
    disabled: true
    description: The preferred server response upon successful completion of the request. Value is:<ul><li><code>return=minimal</code>. The server returns a minimal response to optimize communication between the API caller and the server. A minimal response includes the <code>id</code>, <code>status</code> and HATEOAS links.</li><li><code>return=representation</code>. The server returns a complete resource representation, including the current state of the resource.</li></ul>
body:
  type: json
  content: |-
    {
        "sender_batch_header": {
            "sender_batch_id": "Payouts_{{$timestamp}}",
            "email_subject": "You have a payout!",
            "email_message": "You have received a payout! Thanks for using our service!"
        },
        "items": [
            {
                "recipient_type": "EMAIL",
                "amount": {
                    "value": "10.00",
                    "currency": "USD"
                },
                "note": "Thanks for your patronage!",
                "sender_item_id": "201403140001",
                "receiver": "{{$randomEmail}}",
                "notification_language": "en-US"
            },
            {
                "recipient_type": "PHONE",
                "amount": {
                    "value": "20.00",
                    "currency": "USD"
                },
                "note": "Thanks for your support!",
                "sender_item_id": "201403140002",
                "receiver": "1-{{$randomPhoneNumber}}"
            },
            {
                "recipient_type": "PAYPAL_ID",
                "amount": {
                    "value": "30.00",
                    "currency": "USD"
                },
                "note": "Thanks for your patronage!",
                "sender_item_id": "201403140003",
                "receiver": "5DEJUG27PZB9J"
            }
        ]
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Extract resource_id", function() {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('batch_header');
          pm.collectionVariables.set("payout_batch_id", jsonData.batch_header.payout_batch_id)
      });
    language: text/javascript
  - type: beforeRequest
    code: |-
      // first API in the folder enable delay subsequent APIs only during folder/collection run.
      pm.variables.set('delayed_run', 'true');
    language: text/javascript
examples: ./.resources/Create batch payout.resources/examples
order: 1000
