$kind: http-example
request:
  url: "{{base_url}}/v1/billing/plans/:billing_plan_id/update-pricing-schemes"
  method: POST
  headers:
    Content-Type: application/json
  pathVariables:
    billing_plan_id: "{{billing_plan_id}}"
  body:
    type: json
    content: |-
      {
          "pricing_schemes": [
              {
                  "billing_cycle_sequence": 1,
                  "pricing_scheme": {
                      "fixed_price": {
                          "value": "10",
                          "currency_code": "USD"
                      },
                      "roll_out_strategy": {
                          "effective_time": "2019-02-10T21:20:49Z",
                          "process_change_from": "NEXT_PAYMENT"
                      }
                  }
              },
              {
                  "billing_cycle_sequence": 2,
                  "pricing_scheme": {
                      "fixed_price": {
                          "value": "50",
                          "currency_code": "USD"
                      },
                      "pricing_model": "VOLUME",
                      "tiers": [
                          {
                              "starting_quantity": "1",
                              "ending_quantity": "1000",
                              "amount": {
                                  "value": "150",
                                  "currency_code": "USD"
                              }
                          },
                          {
                              "starting_quantity": "1001",
                              "amount": {
                                  "value": "250",
                                  "currency_code": "USD"
                              }
                          }
                      ],
                      "roll_out_strategy": {
                          "effective_time": "2019-02-10T21:20:49Z",
                          "process_change_from": "NEXT_PAYMENT"
                      }
                  }
              }
          ]
      }
