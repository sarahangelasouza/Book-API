$kind: http-example
request:
  url: "{{base_url}}/v1/billing/subscriptions/:subscription_id/revise"
  method: POST
  headers:
    Content-Type: application/json
  pathVariables:
    subscription_id: "{{subscription_id}}"
  body:
    type: json
    content: |-
      {
        "plan_id": "{{billing_plan_id}}",
        "shipping_amount": {
          "currency_code": "USD",
          "value": "10.00"
        },
        "shipping_address": {
          "name": {
            "full_name": "John Doe"
          },
          "address": {
            "address_line_1": "2211 N First Street",
            "address_line_2": "Building 17",
            "admin_area_2": "San Jose",
            "admin_area_1": "CA",
            "postal_code": "95131",
            "country_code": "US"
          }
        },
        "application_context": {
          "brand_name": "walmart",
          "locale": "en-US",
          "shipping_preference": "SET_PROVIDED_ADDRESS",
          "payment_method": {
            "payer_selected": "PAYPAL",
            "payee_preferred": "IMMEDIATE_PAYMENT_REQUIRED"
          },
          "return_url": "https://example.com/returnUrl",
          "cancel_url": "https://example.com/cancelUrl"
        }
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Connection: keep-alive
    Content-Length: "83"
    Content-Type: application/json
    Server: nginx/1.14.0 (Ubuntu)
    Cache-Control: max-age=0, no-cache, no-store, must-revalidate
    Paypal-Debug-Id: 6731f92815497
    Strict-Transport-Security: max-age=31536000; includeSubDomains
    Edge-Control: max-age=0
    Accept-Ranges: bytes
    Date: Mon, 10 Apr 2023 19:16:15 GMT
    Via: 1.1 varnish
    X-Served-By: cache-chi-kigq8000059-CHI
    X-Cache: MISS
    X-Cache-Hits: "0"
    X-Timer: S1681154176.725055,VS0,VE77
  body:
    type: json
    content: |-
      {
          "error": "invalid_token",
          "error_description": "Token signature verification failed"
      }
order: 2000
