      description: Filters the response to a single event.
    - key: move_to
      value: next
      disabled: true
    - key: offset
      value: "10"
      disabled: true
    - key: prev_offset
      value: "10"
      disabled: true
    - key: index_id
      value: "1"
      disabled: true
