$kind: collection
name: Swagger Plant Store - OpenAPI 3.1
description: >-
  This is a sample Plant Store Server based on the OpenAPI 3.1 specification. It
  provides a comprehensive set of endpoints for managing plants, orders, and
  user authentication.


  ### Key Features


  - **Rich API Documentation**: Includes detailed examples and schema
  definitions.
      
  - **Search Functionality**: Search for plants by tags or status.
      
  - **User-Friendly Endpoints**: Login, logout, and retrieve user information.
      
  - **Error Handling**: Clear and consistent error responses.
      

  ### Developer Notes


  - Use `api_key` for store endpoints requiring authorization.
      
  - OAuth2 flow is available for plant-specific operations.
      

  Contact Support:  

  Name: Plant Store API Support  

  Email: [support@buildwithfern.com](https://mailto:support@buildwithfern.com)
variables:
  baseUrl: https://api.plantstore.dev/v3
