$kind: http-request
url: "{{baseUrl}}/plant"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "name": "Fern",
      "category": "Indoor",
      "tags": [
        "green",
        "leafy"
      ],
      "status": "sold"
    }
examples: ./.resources/Update an existing plant.resources/examples
order: 2000
