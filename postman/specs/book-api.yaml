openapi: 3.1.0
info:
  title: Book API
  description: Simple REST API for managing books. CRUD operations, no authentication required.
  version: 1.0.0
  contact:
    name: James De Luca
    email: james.deluca@postman.com

servers:
  - url: http://localhost:3000
    description: Local development server

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags:
        - System
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/books:
    get:
      summary: List all books
      operationId: listBooks
      tags:
        - Books
      responses:
        "200":
          description: List of all books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookListResponse"


    post:
      summary: Create a book
      operationId: createBook
      tags:
        - Books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "201":
          description: Book created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/books/{id}:
    parameters:
      - $ref: "#/components/parameters/BookId"

    get:
      summary: Get a book by ID
      operationId: getBook
      tags:
        - Books
      responses:
        "200":
          description: Book details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "404":
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: Update a book
      operationId: updateBook
      tags:
        - Books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "200":
          description: Book updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete a book
      operationId: deleteBook
      tags:
        - Books
      responses:
        "200":
          description: Book deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    BookId:
      name: id
      in: path
      required: true
      description: Book ID
      schema:
        $ref: "#/components/schemas/ResourceId"

  schemas:
    ResourceId:
      type: string
      example: "1"

    Book:
      type: object
      required:
        - id
        - title
        - author
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
        title:
          type: string
          example: The Great Gatsby
        author:
          type: string
          example: F. Scott Fitzgerald
        year:
          type: integer
          nullable: true
          example: 1925

    BookInput:
      type: object
      required:
        - title
        - author
      properties:
        title:
          type: string
          example: Dune
        author:
          type: string
          example: Frank Herbert
        year:
          type: integer
          example: 1965

    BookResponse:
      type: object
      properties:
        book:
          $ref: "#/components/schemas/Book"

    BookListResponse:
      type: object
      properties:
        books:
          type: array
          items:
            $ref: "#/components/schemas/Book"

    DeleteResponse:
      type: object
      properties:
        message:
          type: string
          example: Book deleted
        id:
          $ref: "#/components/schemas/ResourceId"

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            name:
              type: string
            message:
              type: string
